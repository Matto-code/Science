<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year 7 Physics Flashcards — Forces</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#2c2c2a;min-height:100vh;padding:1rem}
.wrap{max-width:680px;margin:0 auto;padding-bottom:3rem}
.header{background:#2d1b69;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.header h1{font-size:18px;font-weight:500;color:white;margin-bottom:2px}
.header p{font-size:12px;color:rgba(255,255,255,0.75)}
.filter-section{margin-bottom:0.6rem}
.filter-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:#aaa;margin-bottom:5px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:5px 12px;border:1px solid #ccc;border-radius:20px;font-size:12px;cursor:pointer;background:white;color:#5f5e5a;transition:all 0.15s;white-space:nowrap}
.fb:hover:not(.active):not(.active-n):not(.active-k){background:#e8e6e0}
.fb.active{background:#2d1b69;color:white;border-color:#2d1b69}
.fb.active-n{background:#A32D2D;color:white;border-color:#A32D2D}
.fb.active-k{background:#1a7a4a;color:white;border-color:#1a7a4a}
.divider{height:1px;background:#e0dfd8;margin:0.6rem 0}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.stat-box{background:white;border:1px solid #e0dfd8;border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all 0.15s}
.stat-box:hover{border-color:#aaa}
.stat-num{font-size:22px;font-weight:500}
.sn-t{color:#2d1b69}.sn-n{color:#A32D2D}.sn-k{color:#1a7a4a}
.stat-lbl{font-size:11px;color:#5f5e5a;margin-top:2px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.progress-bar{flex:1;height:6px;background:#e0dfd8;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1a7a4a;border-radius:3px;transition:width 0.4s}
.progress-label{font-size:12px;color:#5f5e5a;white-space:nowrap}
.card-num{font-size:12px;color:#aaa;text-align:center;margin-bottom:0.5rem}
.card-area{perspective:1000px;margin-bottom:1rem}
.card-inner{position:relative;width:100%;transition:transform 0.5s ease;transform-style:preserve-3d;cursor:default}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{background:white;border-radius:14px;border:1px solid #e0dfd8;padding:1.5rem 1.75rem;display:flex;flex-direction:column;backface-visibility:hidden;-webkit-backface-visibility:hidden;min-height:200px}
.card-back{position:absolute;top:0;left:0;width:100%;transform:rotateY(180deg);background:white}
.card-spacer{visibility:hidden;padding:1.5rem 1.75rem;pointer-events:none;border:1px solid transparent;border-radius:14px}
.card-topic{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem;display:inline-block;border-radius:4px;padding:2px 8px}
.card-q{font-size:16px;font-weight:500;color:#2c2c2a;line-height:1.5;margin-bottom:1rem}
.answer-input-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;color:#aaa;margin-bottom:6px}
.answer-input{width:100%;border:1px solid #e0dfd8;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;color:#2c2c2a;background:#fafaf8;line-height:1.5;outline:none;transition:border-color 0.15s}
.answer-input:focus{border-color:#2d1b69;background:white}
.flip-btn{margin-top:0.75rem;width:100%;padding:10px;background:#2d1b69;color:white;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer}
.flip-btn:hover{background:#3d2599}
.back-section{margin-bottom:1rem}
.back-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
.your-answer-box{background:#f5f4f0;border-radius:8px;padding:10px 12px;font-size:13px;color:#5f5e5a;line-height:1.6;min-height:40px;font-style:italic;border-left:3px solid #ccc;white-space:pre-wrap}
.your-answer-box.empty{color:#bbb}
.correct-answer-box{background:#E6F5EE;border-radius:8px;padding:10px 12px;font-size:13px;color:#2c2c2a;line-height:1.7;border-left:3px solid #1a7a4a}
.correct-answer-box strong{color:#0d3d25;font-weight:500}
.correct-answer-box ul{padding-left:1.1rem;margin-top:0.4rem}
.correct-answer-box li{margin-bottom:3px}
.rating-hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:0.6rem;margin-top:0.75rem}
.rating-row{display:flex;gap:8px;margin-top:0.5rem}
.rating-btn{flex:1;padding:12px 8px;border:1.5px solid;border-radius:10px;font-size:13px;cursor:pointer;background:white;transition:all 0.15s;font-weight:500;line-height:1.3}
.rating-btn.again{border-color:#A32D2D;color:#A32D2D}
.rating-btn.again:hover{background:#FCEAEA}
.rating-btn.good{border-color:#1a7a4a;color:#1a7a4a}
.rating-btn.good:hover{background:#E6F5EE}
.flip-back-btn{margin-top:0.75rem;width:100%;padding:9px;background:white;color:#5f5e5a;border:1px solid #ccc;border-radius:10px;font-size:13px;cursor:pointer}
.flip-back-btn:hover{background:#f5f4f0}
.nav-row{display:flex;gap:8px;margin-top:1rem;margin-bottom:1rem}
.nav-btn{flex:1;padding:10px;border:1px solid #ccc;border-radius:10px;font-size:13px;cursor:pointer;background:white;color:#2c2c2a;font-weight:500}
.nav-btn:hover{background:#f5f4f0}
.nav-btn:disabled{opacity:0.35;cursor:default}
.done-screen{background:white;border:1px solid #e0dfd8;border-radius:14px;padding:2rem;text-align:center;display:none}
.done-screen h2{font-size:20px;font-weight:500;margin-bottom:0.5rem}
.done-screen p{font-size:14px;color:#5f5e5a;margin-bottom:1.5rem}
.done-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.done-actions button{padding:9px 20px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:500;border:1px solid #ccc;background:white;color:#2c2c2a}
.done-actions button.primary{background:#2d1b69;color:white;border-color:#2d1b69}
.outline-again{outline:2px solid #A32D2D;border-radius:14px}
.outline-good{outline:2px solid #1a7a4a;border-radius:14px}
</style>
</head>

<script>
const CARDS=[
  // TYPES OF FORCES
  {id:1,topic:'types',topicLabel:'Types of forces',q:'What is a force?',a:'A force is a <strong>push or pull</strong> that can change an object\'s speed, direction or shape. Forces are measured in <strong>Newtons (N)</strong>.'},
  {id:2,topic:'types',topicLabel:'Types of forces',q:'What is the difference between a contact force and a non-contact force?',a:'<strong>Contact forces</strong> require physical contact between objects (e.g. friction, normal force, tension).<br><br><strong>Non-contact forces</strong> act at a distance without touching (e.g. gravity, magnetic, electrostatic).'},
  {id:3,topic:'types',topicLabel:'Types of forces',q:'Name 5 contact forces.',a:'<strong>1. Friction</strong> — opposes motion between surfaces<br><strong>2. Normal force</strong> — surface pushes back on an object<br><strong>3. Tension</strong> — force through a rope/string<br><strong>4. Applied force</strong> — a direct push or pull<br><strong>5. Air resistance (drag)</strong> — friction from air'},
  {id:4,topic:'types',topicLabel:'Types of forces',q:'Name 3 non-contact forces.',a:'<strong>1. Gravity</strong> — attracts all objects with mass toward each other<br><strong>2. Magnetic force</strong> — attraction/repulsion between magnets and magnetic materials<br><strong>3. Electrostatic force</strong> — attraction/repulsion between electrically charged objects'},
  {id:5,topic:'types',topicLabel:'Types of forces',q:'What is friction? Is it contact or non-contact?',a:'Friction is a <strong>contact force</strong> that opposes the motion of an object sliding or rolling over a surface. It always acts in the <strong>opposite direction to motion</strong>. Rougher surfaces create more friction.'},
  {id:6,topic:'types',topicLabel:'Types of forces',q:'What is the normal force?',a:'The <strong>normal force</strong> is a contact force exerted by a surface on an object resting on it. It acts <strong>perpendicular (at right angles)</strong> to the surface — usually straight up. It balances the weight of the object and stops it falling through the surface.'},
  {id:7,topic:'types',topicLabel:'Types of forces',q:'What is air resistance? When is it strongest?',a:'<strong>Air resistance (drag)</strong> is a type of friction between a moving object and air molecules. It always opposes motion through air. It is stronger when:<br>• The object moves faster<br>• The object has a larger surface area<br>A parachute uses large surface area to maximise air resistance and slow a skydiver.'},
  {id:8,topic:'types',topicLabel:'Types of forces',q:'Is gravity a contact or non-contact force? Explain.',a:'Gravity is a <strong>non-contact force</strong> — it acts at a distance without objects needing to touch. It is an attractive force between all objects with mass. On Earth, gravity pulls everything toward the centre of the planet.'},

  // BALANCED / UNBALANCED
  {id:9,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'What are balanced forces? What is the result?',a:'<strong>Balanced forces</strong> are equal in size and opposite in direction — they cancel out. The <strong>net force = 0 N</strong>.<br><br>Result: <strong>no change in motion</strong>. The object stays still, or keeps moving at constant speed in a straight line.'},
  {id:10,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'What are unbalanced forces? What is the result?',a:'<strong>Unbalanced forces</strong> are NOT equal — they don\'t cancel out. The <strong>net force ≠ 0 N</strong>.<br><br>Result: the object <strong>changes its motion</strong> — it speeds up, slows down, or changes direction (it accelerates).'},
  {id:11,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'What is net force?',a:'<strong>Net force</strong> is the overall (resultant) force on an object after all forces are combined.<br><br><strong>Same direction:</strong> add the forces<br><strong>Opposite directions:</strong> subtract the smaller from the larger<br><br>The net force determines whether the object accelerates and in which direction.'},
  {id:12,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'Two forces of 50 N act on an object in opposite directions. What is the net force? Is this balanced or unbalanced?',a:'Net force = 50 − 50 = <strong>0 N</strong>.<br><br>This is <strong>balanced</strong> — the forces cancel out. There is no change in motion.'},
  {id:13,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'A box is pushed right with 70 N. Friction acts left with 30 N. What is the net force and what happens?',a:'Net force = 70 − 30 = <strong>40 N to the right</strong>.<br><br>The forces are <strong>unbalanced</strong> → the box accelerates to the right.'},
  {id:14,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'A car travels at constant speed. Are the forces balanced or unbalanced? Explain.',a:'The forces are <strong>balanced</strong> (net force = 0 N).<br><br>The engine force forward equals the friction + air resistance backward. No net force means no change in motion — constant speed in a straight line.<br><br>Remember: balanced ≠ no forces. It means the forces cancel out.'},
  {id:15,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'Person A pushes a box right with 40 N. Person B pushes the same box right with 25 N. What is the net force?',a:'Both forces are in the <strong>same direction</strong> → add them.<br><br>Net force = 40 + 25 = <strong>65 N to the right</strong>.<br><br>Unbalanced → the box accelerates to the right.'},

  // GRAVITY & WEIGHT
  {id:16,topic:'gravity',topicLabel:'Gravity & weight',q:'What is the difference between mass and weight?',a:'<strong>Mass</strong> = amount of matter in an object. Measured in <strong>kg</strong>. Stays the <strong>same everywhere</strong>.<br><br><strong>Weight</strong> = the gravitational force on an object. Measured in <strong>Newtons (N)</strong>. <strong>Changes</strong> depending on gravity.<br><br>Weight is a force; mass is not.'},
  {id:17,topic:'gravity',topicLabel:'Gravity & weight',q:'What is the formula for calculating weight?',a:'<strong>W = m × g</strong><br><br>Weight (N) = mass (kg) × gravitational field strength (N/kg)<br><br>On Earth, g = 10 N/kg.<br>On the Moon, g = 1.6 N/kg.'},
  {id:18,topic:'gravity',topicLabel:'Gravity & weight',q:'A student has mass 55 kg. What is their weight on Earth? (g = 10 N/kg)',a:'W = m × g<br>W = 55 × 10<br><strong>W = 550 N</strong> downward.<br><br>Weight is always directed toward the centre of the Earth.'},
  {id:19,topic:'gravity',topicLabel:'Gravity & weight',q:'An object weighs 800 N on Earth (g = 10 N/kg). What is its mass?',a:'Rearrange the formula: m = W ÷ g<br>m = 800 ÷ 10<br><strong>m = 80 kg</strong><br><br>Mass stays 80 kg no matter where the object is.'},
  {id:20,topic:'gravity',topicLabel:'Gravity & weight',q:'A 60 kg astronaut goes to the Moon (g = 1.6 N/kg). What is their weight? Does their mass change?',a:'W = m × g = 60 × 1.6 = <strong>96 N</strong><br><br>(Compared to 600 N on Earth — about 1/6)<br><br><strong>Mass stays 60 kg</strong> — mass never changes. Only weight changes because gravity is different.'},
  {id:21,topic:'gravity',topicLabel:'Gravity & weight',q:'What is Earth\'s gravitational field strength and what does it mean?',a:'Earth\'s gravitational field strength is approximately <strong>10 N/kg</strong>.<br><br>This means for every 1 kg of mass, gravity pulls with a force of 10 N. A 5 kg bag experiences 50 N of gravitational force downward.'},
  {id:22,topic:'gravity',topicLabel:'Gravity & weight',q:'Why do we say "I weigh 60 kg" in everyday life, but this is wrong in science?',a:'In everyday life, people use "weight" to mean mass. But in science:<br>• 60 kg is <strong>mass</strong> (amount of matter)<br>• <strong>Weight</strong> would be 60 × 10 = <strong>600 N</strong> (the force of gravity)<br><br>Mass is in kg. Weight is in Newtons. They are different things.'},

  // FORCE DIAGRAMS
  {id:23,topic:'diagrams',topicLabel:'Force diagrams',q:'What do force diagram arrows represent?',a:'In force diagrams, arrows show:<br>• <strong>Direction of the arrow</strong> = direction the force acts<br>• <strong>Length of the arrow</strong> = magnitude (size) of the force — a bigger force has a longer arrow<br><br>Each arrow should be labelled with the force name and value (e.g. "Gravity 50 N ↓").'},
  {id:24,topic:'diagrams',topicLabel:'Force diagrams',q:'Draw a force diagram for a book resting on a table. What forces act on it?',a:'Two forces act on the book:<br><br><strong>1. Weight (gravity)</strong> — arrow pointing downward<br><strong>2. Normal force</strong> — arrow pointing upward (same length)<br><br>The arrows are <strong>equal and opposite</strong> → balanced → the book stays still.'},
  {id:25,topic:'diagrams',topicLabel:'Force diagrams',q:'Draw a force diagram for a box being pushed across a floor. The push is greater than friction.',a:'Four forces:<br><strong>Weight ↓</strong> and <strong>Normal force ↑</strong> (balanced vertically)<br><strong>Applied force →</strong> (large arrow) and <strong>Friction ←</strong> (smaller arrow)<br><br>Push > Friction → net force to the right → box <strong>accelerates right</strong>. The rightward arrow should be longer than the leftward arrow.'},
  {id:26,topic:'diagrams',topicLabel:'Force diagrams',q:'What forces act on a skydiver in early free fall (before terminal velocity)?',a:'<strong>Gravity ↓</strong> — large arrow downward (strong force)<br><strong>Air resistance ↑</strong> — small arrow upward (weak at first)<br><br>Gravity > Air resistance → <strong>unbalanced</strong> → skydiver <strong>accelerates downward</strong>.<br><br>As speed increases, air resistance grows. Eventually they become equal → balanced → <strong>terminal velocity</strong> (constant falling speed).'},
  {id:27,topic:'diagrams',topicLabel:'Force diagrams',q:'What is the most important rule when drawing force diagrams?',a:'Only draw forces that act <strong>ON the object</strong> — not forces the object exerts on other things.<br><br>For example, for a book on a table: draw gravity pulling the book down and the table pushing the book up. Do NOT draw the book pushing down on the table (that acts on the table, not the book).'},

  // MASS & MOTION
  {id:28,topic:'motion',topicLabel:'Mass & motion',q:'If you apply the same force to a light ball and a heavy ball, which accelerates more?',a:'The <strong>lighter ball</strong> accelerates more.<br><br>For the same force, a smaller mass means a greater change in motion (more acceleration). The heavy ball has more mass resisting the change — this resistance is called <strong>inertia</strong>.'},
  {id:29,topic:'motion',topicLabel:'Mass & motion',q:'What three things determine how a force changes an object\'s motion?',a:'1. <strong>Magnitude (size)</strong> of the net force — larger force = greater acceleration<br><br>2. <strong>Direction</strong> of the net force — the object accelerates in the same direction as the net force<br><br>3. <strong>Mass</strong> of the object — larger mass = less acceleration for the same force'},
  {id:30,topic:'motion',topicLabel:'Mass & motion',q:'What happens to an object when the net force on it is zero?',a:'The object does <strong>NOT change its motion</strong>:<br>• If it was stationary → it stays stationary<br>• If it was moving → it keeps moving at the <strong>same speed in the same direction</strong><br><br>Zero net force = balanced forces = no acceleration.'},
  {id:31,topic:'motion',topicLabel:'Mass & motion',q:'A shopping trolley is harder to push when full than when empty. Explain using the relationship between mass and force.',a:'A full trolley has <strong>more mass</strong> than an empty one. For the same pushing force, a greater mass results in <strong>less acceleration</strong> (less change in motion).<br><br>You need a <strong>greater force</strong> to achieve the same acceleration for the heavier trolley.'},
  {id:32,topic:'motion',topicLabel:'Mass & motion',q:'What happens when an unbalanced force acts on an object?',a:'The object <strong>accelerates</strong> — it changes its motion. This could mean:<br>• <strong>Speeding up</strong> (force in the direction of motion)<br>• <strong>Slowing down</strong> (force opposite to motion)<br>• <strong>Changing direction</strong> (force at an angle to motion)<br><br>The acceleration is in the <strong>same direction</strong> as the net force.'},
  {id:33,topic:'motion',topicLabel:'Mass & motion',q:'If you double the net force on an object (keeping mass the same), what happens to the acceleration?',a:'The acceleration <strong>doubles</strong>.<br><br>For the same mass: more force = more acceleration. The relationship is directly proportional — double the force, double the acceleration.'},
  {id:34,topic:'motion',topicLabel:'Mass & motion',q:'If you double the mass of an object (keeping force the same), what happens to the acceleration?',a:'The acceleration <strong>halves</strong>.<br><br>For the same force: more mass = less acceleration. Mass resists changes in motion (inertia). Double the mass = half the acceleration.'},
];

const STORAGE_KEY='yr7phys_ratings_v1';
let deck=[],currentIdx=0,isFlipped=false,cardRatings={},currentFilter='all';

function saveRatings(){try{window.storage.set(STORAGE_KEY,JSON.stringify(cardRatings))}catch(e){}try{sessionStorage.setItem(STORAGE_KEY,JSON.stringify(cardRatings))}catch(e){}}
async function loadRatings(){try{const r=await window.storage.get(STORAGE_KEY);if(r&&r.value){cardRatings=JSON.parse(r.value);return}}catch(e){}try{const s=sessionStorage.getItem(STORAGE_KEY);if(s){cardRatings=JSON.parse(s);return}}catch(e){}cardRatings={}}

function topicBg(t){return{types:'#F0EDFB',balanced:'#EBF3FB',gravity:'#FDF3E3',diagrams:'#E6F5EE',motion:'#FCEAEA'}[t]||'#f5f4f0'}
function topicFg(t){return{types:'#2d1b69',balanced:'#0d2447',gravity:'#5a3c06',diagrams:'#0d3d25',motion:'#5a1010'}[t]||'#444'}

function countNeeds(){return CARDS.filter(c=>cardRatings[c.id]==='again').length}
function countKnowit(){return CARDS.filter(c=>cardRatings[c.id]==='good').length}
function countUnrated(){return CARDS.filter(c=>!cardRatings[c.id]).length}
function updateCounts(){
  const n=countNeeds(),k=countKnowit();
  document.getElementById('needs-count').textContent=n;
  document.getElementById('knowit-count').textContent=k;
  document.getElementById('unrated-count').textContent=countUnrated();
  document.getElementById('st-needs').textContent=n;
  document.getElementById('st-knowit').textContent=k;
  document.getElementById('st-total').textContent=n+k;
}

function setFilter(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active','active-n','active-k'));
  if(filter==='needs')btn.classList.add('active-n');
  else if(filter==='knowit')btn.classList.add('active-k');
  else btn.classList.add('active');
  if(filter==='needs'){deck=CARDS.filter(c=>cardRatings[c.id]==='again');if(!deck.length){alert('No "Needs work" cards yet!');deck=[...CARDS];}}
  else if(filter==='knowit'){deck=CARDS.filter(c=>cardRatings[c.id]==='good');if(!deck.length){alert('No "Know it!" cards yet!');deck=[...CARDS];}}
  else if(filter==='unrated'){deck=CARDS.filter(c=>!cardRatings[c.id]);if(!deck.length){alert('All rated! Showing all.');deck=[...CARDS];}}
  else if(filter==='all')deck=[...CARDS];
  else deck=CARDS.filter(c=>c.topic===filter);
  shuffle(deck);currentIdx=0;isFlipped=false;
  document.getElementById('done-screen').style.display='none';
  document.getElementById('card-area').style.display='block';
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('answer-input').value='';
  showCard();updateProgress();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function showCard(){
  if(!deck.length)return;
  const c=deck[currentIdx];
  document.getElementById('topic-badge').textContent=c.topicLabel;
  document.getElementById('topic-badge').style.cssText=`background:${topicBg(c.topic)};color:${topicFg(c.topic)}`;
  document.getElementById('card-q').textContent=c.q;
  document.getElementById('topic-badge-back').textContent=c.topicLabel;
  document.getElementById('topic-badge-back').style.cssText=`background:${topicBg(c.topic)};color:${topicFg(c.topic)}`;
  document.getElementById('card-a').innerHTML=c.a;
  document.getElementById('card-num').textContent=(currentIdx+1)+' of '+deck.length;
  const r=cardRatings[c.id];
  document.getElementById('card-area').className='card-area'+(r==='again'?' outline-again':r==='good'?' outline-good':'');
  document.getElementById('btn-prev').disabled=currentIdx===0;
  document.getElementById('btn-next').disabled=currentIdx===deck.length-1;
  requestAnimationFrame(()=>{
    const f=document.getElementById('card-front'),b=document.getElementById('card-back'),s=document.getElementById('card-spacer');
    s.innerHTML=document.getElementById('card-a').innerHTML;
    s.style.minHeight=Math.max(200,f.scrollHeight,b.scrollHeight)+'px';
  });
}

function flipCard(){
  if(isFlipped)return;isFlipped=true;
  const typed=document.getElementById('answer-input').value.trim();
  const d=document.getElementById('your-answer-display');
  if(typed){d.textContent=typed;d.classList.remove('empty')}else{d.textContent='(no answer written)';d.classList.add('empty')}
  document.getElementById('card-inner').classList.add('flipped');
  requestAnimationFrame(()=>{const b=document.getElementById('card-back'),s=document.getElementById('card-spacer');s.style.minHeight=Math.max(200,b.scrollHeight)+'px'});
}
function unflipCard(){
  if(!isFlipped)return;isFlipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  requestAnimationFrame(()=>{const f=document.getElementById('card-front'),s=document.getElementById('card-spacer');s.style.minHeight=Math.max(200,f.scrollHeight)+'px'});
}

function rate(r){
  const c=deck[currentIdx];cardRatings[c.id]=r;saveRatings();updateCounts();
  document.getElementById('card-area').className='card-area'+(r==='again'?' outline-again':' outline-good');
  setTimeout(()=>{if(currentIdx<deck.length-1)nextCard();else showDone()},300);
}

function nextCard(){if(currentIdx<deck.length-1){currentIdx++;resetToFront()}else showDone()}
function prevCard(){if(currentIdx>0){currentIdx--;resetToFront()}}
function resetToFront(){isFlipped=false;document.getElementById('card-inner').classList.remove('flipped');document.getElementById('answer-input').value='';showCard();updateProgress()}

function updateProgress(){
  const rated=deck.filter(c=>cardRatings[c.id]).length;
  const pct=deck.length?Math.round(rated/deck.length*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=rated+' / '+deck.length+' rated';
}

function showDone(){
  document.getElementById('card-area').style.display='none';
  document.getElementById('card-num').textContent='';
  const ds=document.getElementById('done-screen');ds.style.display='block';
  const n=countNeeds(),k=countKnowit();
  document.getElementById('done-title').textContent=k>n?'🎉 Great work!':'💪 Keep going!';
  document.getElementById('done-msg').textContent=k+' card'+(k!==1?'s':'')+' in Know it! and '+n+' in Needs work.'+(n>0?' Review the Needs work pile to lock them in.':'');
  document.getElementById('btn-do-needs').style.display=n>0?'':'none';
}
function restartDeck(){document.getElementById('done-screen').style.display='none';document.getElementById('card-area').style.display='block';shuffle(deck);currentIdx=0;resetToFront()}

async function init(){await loadRatings();deck=[...CARDS];shuffle(deck);showCard();updateCounts();updateProgress()}
init();
</script>
</body>
</html>
