<title>Year 7 Physics Flashcards — Forces</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#2c2c2a;min-height:100vh;padding:1rem}
.wrap{max-width:680px;margin:0 auto;padding-bottom:3rem}
.header{background:#2d1b69;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.header h1{font-size:18px;font-weight:500;color:white;margin-bottom:2px}
.header p{font-size:12px;color:rgba(255,255,255,0.75)}
.filter-section{margin-bottom:0.6rem}
.filter-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;color:#aaa;margin-bottom:5px}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:5px 11px;border:1px solid #ccc;border-radius:20px;font-size:11px;cursor:pointer;background:white;color:#5f5e5a;transition:all 0.15s;white-space:nowrap}
.fb:hover:not(.active):not(.active-n):not(.active-k){background:#e8e6e0}
.fb.active{background:#2d1b69;color:white;border-color:#2d1b69}
.fb.active-n{background:#A32D2D;color:white;border-color:#A32D2D}
.fb.active-k{background:#1a7a4a;color:white;border-color:#1a7a4a}
.divider{height:1px;background:#e0dfd8;margin:0.6rem 0}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem}
.stat-box{background:white;border:1px solid #e0dfd8;border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all 0.15s}
.stat-box:hover{border-color:#aaa}
.stat-num{font-size:22px;font-weight:500}
.sn-t{color:#2d1b69}.sn-n{color:#A32D2D}.sn-k{color:#1a7a4a}
.stat-lbl{font-size:11px;color:#5f5e5a;margin-top:2px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.progress-bar{flex:1;height:6px;background:#e0dfd8;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:#1a7a4a;border-radius:3px;transition:width 0.4s}
.progress-label{font-size:12px;color:#5f5e5a;white-space:nowrap}
.card-num{font-size:12px;color:#aaa;text-align:center;margin-bottom:0.5rem}
.card-area{perspective:1000px;margin-bottom:1rem}
.card-inner{position:relative;width:100%;transition:transform 0.5s ease;transform-style:preserve-3d;cursor:default}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{background:white;border-radius:14px;border:1px solid #e0dfd8;padding:1.5rem 1.75rem;display:flex;flex-direction:column;backface-visibility:hidden;-webkit-backface-visibility:hidden;min-height:200px}
.card-back{position:absolute;top:0;left:0;width:100%;transform:rotateY(180deg);background:white}
.card-spacer{visibility:hidden;padding:1.5rem 1.75rem;pointer-events:none;border:1px solid transparent;border-radius:14px}
.card-topic{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.75rem;display:inline-block;border-radius:4px;padding:2px 8px}
.card-q{font-size:16px;font-weight:500;color:#2c2c2a;line-height:1.5;margin-bottom:1rem}
.answer-input-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;color:#aaa;margin-bottom:6px}
.answer-input{width:100%;border:1px solid #e0dfd8;border-radius:8px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;color:#2c2c2a;background:#fafaf8;line-height:1.5;outline:none}
.answer-input:focus{border-color:#2d1b69;background:white}
.flip-btn{margin-top:0.75rem;width:100%;padding:10px;background:#2d1b69;color:white;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer}
.flip-btn:hover{background:#3d2599}
.back-section{margin-bottom:1rem}
.back-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px}
.your-answer-box{background:#f5f4f0;border-radius:8px;padding:10px 12px;font-size:13px;color:#5f5e5a;line-height:1.6;min-height:40px;font-style:italic;border-left:3px solid #ccc;white-space:pre-wrap}
.your-answer-box.empty{color:#bbb}
.correct-answer-box{background:#E6F5EE;border-radius:8px;padding:10px 12px;font-size:13px;color:#2c2c2a;line-height:1.7;border-left:3px solid #1a7a4a}
.correct-answer-box strong{color:#0d3d25;font-weight:500}
.correct-answer-box ul{padding-left:1.1rem;margin-top:0.4rem}
.correct-answer-box li{margin-bottom:3px}
.rating-hint{font-size:11px;color:#aaa;text-align:center;margin-bottom:0.6rem;margin-top:0.75rem}
.rating-row{display:flex;gap:8px;margin-top:0.5rem}
.rating-btn{flex:1;padding:12px 8px;border:1.5px solid;border-radius:10px;font-size:13px;cursor:pointer;background:white;transition:all 0.15s;font-weight:500;line-height:1.3}
.rating-btn.again{border-color:#A32D2D;color:#A32D2D}
.rating-btn.again:hover{background:#FCEAEA}
.rating-btn.good{border-color:#1a7a4a;color:#1a7a4a}
.rating-btn.good:hover{background:#E6F5EE}
.flip-back-btn{margin-top:0.75rem;width:100%;padding:9px;background:white;color:#5f5e5a;border:1px solid #ccc;border-radius:10px;font-size:13px;cursor:pointer}
.flip-back-btn:hover{background:#f5f4f0}
.nav-row{display:flex;gap:8px;margin-top:1rem;margin-bottom:1rem}
.nav-btn{flex:1;padding:10px;border:1px solid #ccc;border-radius:10px;font-size:13px;cursor:pointer;background:white;color:#2c2c2a;font-weight:500}
.nav-btn:hover{background:#f5f4f0}
.nav-btn:disabled{opacity:0.35;cursor:default}
.done-screen{background:white;border:1px solid #e0dfd8;border-radius:14px;padding:2rem;text-align:center;display:none}
.done-screen h2{font-size:20px;font-weight:500;margin-bottom:0.5rem}
.done-screen p{font-size:14px;color:#5f5e5a;margin-bottom:1.5rem}
.done-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.done-actions button{padding:9px 20px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:500;border:1px solid #ccc;background:white;color:#2c2c2a}
.done-actions button.primary{background:#2d1b69;color:white;border-color:#2d1b69}
.outline-again{outline:2px solid #A32D2D;border-radius:14px}
.outline-good{outline:2px solid #1a7a4a;border-radius:14px}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
  <h1>Year 7 Physics Flashcards — Exam Revision</h1>

</div>
<div class="filter-section">
  <div class="filter-label">By topic</div>
  <div class="filter-row">
    <button class="fb active" onclick="setFilter('all',this)">All cards</button>

  <div class="stat-box" onclick="setFilter('all',document.querySelector('.fb'))"><div class="stat-num sn-t" id="st-total">0</div><div class="stat-lbl">Total rated</div></div>

  <div class="stat-box" onclick="setFilter('knowit',document.getElementById('btn-knowit'))"><div class="stat-num sn-k" id="st-knowit">0</div><div class="stat-lbl">🟢 Know it!</div></div>

<div class="progress-row"><div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div><div class="progress-label" id="prog-label">0 / 0</div></div>
<div class="card-num" id="card-num"></div>
<div class="card-area" id="card-area">
  <div class="card-inner" id="card-inner">
    <div class="card-face" id="card-front">
      <span class="card-topic" id="topic-badge"></span>

      <div class="back-section"><div class="back-section-label" style="color:#0d3d25">Correct answer</div><div class="correct-answer-box" id="card-a"></div></div>

    <button onclick="restartDeck()">Restart</button>
    <button onclick="setFilter('needs',document.getElementById('btn-needs'))" id="btn-do-needs" style="display:none">🔴 Needs work</button>
    <button class="primary" onclick="setFilter('all',document.querySelector('.fb'))">All cards</button>
  </div>
</div>
</div>
<script>
const CARDS=[
// TYPES OF FORCES
{id:1,topic:'types',topicLabel:'Types of forces',q:'What is a contact force? Give 3 examples.',a:'A <strong>contact force</strong> requires physical contact between objects — they must be touching.<br><br>Examples: <strong>friction, normal force, tension, applied force (push/pull), air resistance</strong>'},
{id:2,topic:'types',topicLabel:'Types of forces',q:'What is a non-contact force? Give 3 examples.',a:'A <strong>non-contact force</strong> acts at a distance — the objects do NOT need to touch.<br><br>Examples: <strong>gravity, magnetic force, electrostatic force</strong>'},
{id:3,topic:'types',topicLabel:'Types of forces',q:'What is friction?',a:'<strong>Friction</strong> is a contact force that <strong>opposes motion</strong> between two surfaces in contact. It always acts in the <strong>opposite direction</strong> to the movement. Rougher surfaces produce more friction.'},
{id:4,topic:'types',topicLabel:'Types of forces',q:'What is the normal force?',a:'The <strong>normal force</strong> is a contact force exerted by a surface on an object resting on it. It acts <strong>perpendicular</strong> (at right angles) to the surface — usually upward. It balances gravity, preventing the object from falling through.'},
{id:5,topic:'types',topicLabel:'Types of forces',q:'What is upthrust (buoyancy)?',a:'<strong>Upthrust</strong> is the upward force exerted by a fluid (liquid or gas) on an object submerged in it. It acts in the <strong>opposite direction to gravity</strong>. If upthrust equals weight, the object floats. If weight is greater, it sinks.'},
{id:6,topic:'types',topicLabel:'Types of forces',q:'What is electrostatic force? Give an example.',a:'<strong>Electrostatic force</strong> is a non-contact force between electrically <strong>charged objects</strong>. Like charges repel, opposite charges attract.<br><br>Example: rubbing a balloon on hair creates static charge — the balloon sticks to a wall.'},
{id:7,topic:'types',topicLabel:'Types of forces',q:'What instrument is used to measure force? What unit does it measure in?',a:'A <strong>spring balance</strong> (also called a <strong>Newton meter</strong>) measures force. It measures in <strong>Newtons (N)</strong>.<br><br>It works by stretching a spring — the more force applied, the more the spring stretches, and the higher the reading.'},
{id:8,topic:'types',topicLabel:'Types of forces',q:'Explain how molecules in the air cause air resistance.',a:'As an object moves through air, it <strong>collides with air molecules</strong> in its path. These collisions push back against the object, creating a force that <strong>opposes the direction of motion</strong>. This opposing force is air resistance (drag).'},
{id:9,topic:'types',topicLabel:'Types of forces',q:'Explain why air resistance is larger when a car is travelling faster.',a:'At higher speeds, the car <strong>hits more air molecules per second</strong> and each collision is <strong>more forceful</strong>. The faster the object moves, the more air molecules it encounters and the harder they push back — so air resistance increases with speed.'},

// BALANCED / UNBALANCED
{id:10,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'Define balanced forces.',a:'<strong>Balanced forces</strong> are forces that are <strong>equal in size</strong> and act in <strong>opposite directions</strong>. They cancel each other out, so the net force = <strong>0 N</strong>.<br><br>Result: <strong>no change in motion</strong> — the object stays still or continues at constant speed.'},
{id:11,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'Define unbalanced forces.',a:'<strong>Unbalanced forces</strong> are forces that do <strong>NOT cancel out</strong> — one force is larger than the other. The net force is <strong>NOT zero</strong>.<br><br>Result: the object <strong>changes its motion</strong> — it speeds up, slows down, or changes direction.'},
{id:12,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'If an object has a resultant force of 0 N, describe the 2 options of motion it can have.',a:'With a resultant force of 0 N (balanced forces), the object can either be:<br><br><strong>1. Stationary</strong> — staying completely still<br><strong>2. Moving at constant speed in a straight line</strong> — no acceleration<br><br>In both cases, there is <strong>no change in motion</strong>.'},
{id:13,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'A person sits in a chair without moving. Are the forces balanced or unbalanced? Explain.',a:'The forces are <strong>balanced</strong>.<br><br><strong>Gravity</strong> pulls the person downward and the <strong>normal force</strong> of the chair pushes upward. These forces are equal and opposite → net force = 0 N → the person stays still.'},
{id:14,topic:'balanced',topicLabel:'Balanced / Unbalanced',q:'A tug-of-war: one team pulls harder than the other. Are the forces balanced or unbalanced?',a:'The forces are <strong>unbalanced</strong>.<br><br>One team pulls with a greater force than the other. The net force is NOT zero — it acts in the direction of the stronger team. The rope (and the weaker team) <strong>accelerates toward the stronger team</strong>.'},

// NET FORCE
{id:15,topic:'netforce',topicLabel:'Net force',q:'A cyclist: 60 N forward, 15 N backward. What is the net force?',a:'Forces are in <strong>opposite directions</strong> → subtract.<br><br>Net force = 60 − 15 = <strong>45 N forward</strong> (→)<br><br>Unbalanced → cyclist accelerates forward.'},
{id:16,topic:'netforce',topicLabel:'Net force',q:'A cyclist: 40 N forward, 10 N forward (same direction). What is the net force?',a:'Forces are in the <strong>same direction</strong> → add.<br><br>Net force = 40 + 10 = <strong>50 N forward</strong> (→)<br><br>Unbalanced → cyclist accelerates forward.'},
{id:17,topic:'netforce',topicLabel:'Net force',q:'A cyclist: 200 N forward, 50 N backward. What is the net force?',a:'Opposite directions → subtract.<br><br>Net force = 200 − 50 = <strong>150 N forward</strong> (→)<br><br>Unbalanced → cyclist accelerates forward.'},
{id:18,topic:'netforce',topicLabel:'Net force',q:'A car: 18 N backward, 38 N forward. What is the net force?',a:'Opposite directions → subtract.<br><br>Net force = 38 − 18 = <strong>20 N forward</strong> (→)<br><br>Unbalanced → car accelerates forward.'},
{id:19,topic:'netforce',topicLabel:'Net force',q:'A car: 300 N backward, 190 N forward. What is the net force?',a:'Opposite directions → subtract.<br><br>Net force = 300 − 190 = <strong>110 N backward</strong> (←)<br><br>Unbalanced → car decelerates (slows down). The larger force is backward.'},
{id:20,topic:'netforce',topicLabel:'Net force',q:'A boat: 2500 N upward, 2500 N downward. What is the net force?',a:'Opposite directions, <strong>equal magnitude</strong> → cancel out.<br><br>Net force = 2500 − 2500 = <strong>0 N (balanced)</strong><br><br>The boat stays still or moves at constant speed — no change in motion.'},
{id:21,topic:'netforce',topicLabel:'Net force',q:'A car: 870 N backward, 870 N forward. What is the net force and what happens?',a:'Net force = 870 − 870 = <strong>0 N (balanced)</strong><br><br>Forces are equal and opposite → the car continues at <strong>constant speed</strong>. There is no acceleration.'},
{id:22,topic:'netforce',topicLabel:'Net force',q:'How do you calculate net force for forces in the SAME direction?',a:'<strong>Add them together.</strong><br><br>Example: 40 N right + 25 N right = <strong>65 N right</strong><br><br>Forces in the same direction combine to create a larger force in that direction.'},
{id:23,topic:'netforce',topicLabel:'Net force',q:'How do you calculate net force for forces in OPPOSITE directions?',a:'<strong>Subtract the smaller from the larger.</strong> The net force acts in the direction of the larger force.<br><br>Example: 200 N right − 50 N left = <strong>150 N right</strong>'},

// GRAVITY & WEIGHT
{id:24,topic:'gravity',topicLabel:'Gravity & weight',q:'What is the difference between mass and weight?',a:'<strong>Mass</strong> = amount of matter. Measured in <strong>kg</strong>. Stays the <strong>same everywhere</strong>.<br><br><strong>Weight</strong> = gravitational force. Measured in <strong>Newtons (N)</strong>. <strong>Changes</strong> with gravity.<br><br>Weight IS a force. Mass is NOT.'},
{id:25,topic:'gravity',topicLabel:'Gravity & weight',q:'Does a person falling at 9.8 m/s² have force acting on them? Explain.',a:'<strong>Yes.</strong> Gravity is acting on them, pulling them downward at 9.8 m/s² (Earth\'s gravitational acceleration).<br><br>The force is their <strong>weight</strong> (W = m × g). If they are accelerating downward, the gravitational force is <strong>greater</strong> than air resistance — the forces are unbalanced.'},
{id:26,topic:'gravity',topicLabel:'Gravity & weight',q:'What is the difference between a skydiver in free fall and one at terminal velocity?',a:'<strong>Free fall:</strong> Gravity > Air resistance → unbalanced → skydiver <strong>accelerates</strong> downward (speeds up).<br><br><strong>Terminal velocity:</strong> Gravity = Air resistance → <strong>balanced</strong> → skydiver falls at <strong>constant speed</strong> (no more acceleration).<br><br>At terminal velocity, the force arrows are the same length.'},

// FORCE DIAGRAMS
{id:27,topic:'diagrams',topicLabel:'Force diagrams',q:'What two things do the arrows on a free body diagram show?',a:'The arrows show:<br><br><strong>1. Direction</strong> — which way the force is acting (the arrow points in the direction of the force)<br><br><strong>2. Magnitude (size)</strong> — how much force there is (a longer arrow = a bigger force)'},
{id:28,topic:'diagrams',topicLabel:'Force diagrams',q:'In a force diagram with thrust (D) going right, what would force B (going left) be called?',a:'If D is <strong>thrust</strong> (forward/right), then B (going left/backward) would be <strong>drag (air resistance)</strong>.<br><br>Drag always opposes the direction of motion. If thrust pushes forward, drag pushes backward.'},
{id:29,topic:'diagrams',topicLabel:'Force diagrams',q:'A box has 4 forces: A (up), B (left), C (down), D (right). D is the largest arrow. Describe the motion.',a:'Since <strong>D (right)</strong> is the largest force, the net force is to the <strong>right</strong>. The object <strong>accelerates to the right</strong>.<br><br>If A and C are equal → balanced vertically (no up/down motion).<br>If D > B → unbalanced horizontally → the object speeds up to the right.'},

// SPEED / DISTANCE / TIME
{id:30,topic:'speed',topicLabel:'Speed / Distance / Time',q:'What is the formula for speed? What units is it measured in?',a:'<strong>Speed = Distance ÷ Time</strong><br><br>Units: <strong>m/s</strong> (metres per second) or <strong>km/h</strong> (kilometres per hour)<br><br>Formula triangle: Distance on top, Speed and Time on the bottom.<br>D = S × T &nbsp;|&nbsp; T = D ÷ S &nbsp;|&nbsp; S = D ÷ T'},
{id:31,topic:'speed',topicLabel:'Speed / Distance / Time',q:'A car travels 5 km in 3 hours. Calculate its speed.',a:'S = D ÷ T<br>S = 5 ÷ 3<br><strong>S = 1.67 km/h</strong> (or 1⅔ km/h)'},
{id:32,topic:'speed',topicLabel:'Speed / Distance / Time',q:'A horse walks at 6 km/h. How far will it walk in 2.5 hours?',a:'D = S × T<br>D = 6 × 2.5<br><strong>D = 15 km</strong>'},
{id:33,topic:'speed',topicLabel:'Speed / Distance / Time',q:'Terminal velocity is 90 m/s. You\'ve fallen 800 m since reaching terminal velocity. How long have you been at terminal velocity?',a:'T = D ÷ S<br>T = 800 ÷ 90<br><strong>T = 8.89 seconds</strong> (approximately 8.9 s)'},
{id:34,topic:'speed',topicLabel:'Speed / Distance / Time',q:'A car travels 4 km in 5 minutes. Calculate the average speed in km/h.',a:'Convert time: 5 minutes = 5/60 hours = <strong>1/12 hour</strong><br><br>S = D ÷ T<br>S = 4 ÷ (5/60)<br>S = 4 × 12<br><strong>S = 48 km/h</strong><br><br>OR in m/s: 4000m ÷ 300s = 13.3 m/s'},
{id:35,topic:'speed',topicLabel:'Speed / Distance / Time',q:'A plane takes 8 hours to cross the Atlantic — a journey of 7000 km. How fast does it travel?',a:'S = D ÷ T<br>S = 7000 ÷ 8<br><strong>S = 875 km/h</strong>'},
{id:36,topic:'speed',topicLabel:'Speed / Distance / Time',q:'A headless chicken runs 40 m across a field in 10 seconds. Calculate its speed.',a:'S = D ÷ T<br>S = 40 ÷ 10<br><strong>S = 4 m/s</strong>'},
{id:37,topic:'speed',topicLabel:'Speed / Distance / Time',q:'A sloth climbs a 15 m tree in 10 minutes. How fast does it travel?',a:'Convert: 10 minutes = <strong>600 seconds</strong><br><br>S = D ÷ T<br>S = 15 ÷ 600<br><strong>S = 0.025 m/s</strong><br><br>(That\'s 2.5 cm per second!)'},
{id:38,topic:'speed',topicLabel:'Speed / Distance / Time',q:'Write out the three versions of the Speed-Distance-Time formula.',a:'<strong>Speed = Distance ÷ Time</strong> (S = D/T)<br><br><strong>Distance = Speed × Time</strong> (D = S × T)<br><br><strong>Time = Distance ÷ Speed</strong> (T = D/S)<br><br>Remember the triangle: D on top, S and T on the bottom.'},

// F = ma
{id:39,topic:'fma',topicLabel:'F = ma',q:'What is the formula that links force, mass and acceleration?',a:'<strong>F = m × a</strong><br><br>Force (N) = Mass (kg) × Acceleration (m/s²)<br><br>Rearranged:<br>a = F ÷ m (acceleration)<br>m = F ÷ a (mass)'},
{id:40,topic:'fma',topicLabel:'F = ma',q:'A missile accelerates at 150 m/s². It has a mass of 900 kg. How much force does it have?',a:'F = m × a<br>F = 900 × 150<br><strong>F = 135,000 N</strong> (or 135 kN)'},
{id:41,topic:'fma',topicLabel:'F = ma',q:'Mr Sanchez falls off a cliff. He has a mass of 90 kg and falls at 10 m/s². What force is acting on him?',a:'F = m × a<br>F = 90 × 10<br><strong>F = 900 N</strong><br><br>This is his weight (the force of gravity pulling him down). Notice W = m × g gives the same answer: 90 × 10 = 900 N.'},

// SIMPLE MACHINES & LEVERS
{id:42,topic:'levers',topicLabel:'Simple machines',q:'Name the 3 types of simple machines (that your teacher focuses on).',a:'<strong>1. Levers</strong><br><strong>2. Inclined planes (ramps/wedges)</strong><br><strong>3. Pulleys</strong><br><br>Simple machines make work easier by changing the direction, magnitude or distance over which a force is applied.'},
{id:43,topic:'levers',topicLabel:'Simple machines',q:'What are the 3 parts of a lever?',a:'<strong>1. Effort (Force)</strong> — the force you apply<br><strong>2. Load</strong> — the object being moved or lifted<br><strong>3. Fulcrum (Pivot)</strong> — the fixed point the lever rotates around<br><br>The position of these three parts determines the class of lever.'},
{id:44,topic:'levers',topicLabel:'Simple machines',q:'What is a 1st class lever? Give 2 examples.',a:'In a <strong>1st class lever</strong>, the <strong>fulcrum is between</strong> the effort and the load.<br><br>Order: <strong>Effort — Fulcrum — Load</strong> (or Load — Fulcrum — Effort)<br><br>Examples: <strong>seesaw, scissors, pliers, crowbar, claw hammer</strong>'},
{id:45,topic:'levers',topicLabel:'Simple machines',q:'What is a 2nd class lever? Give 2 examples.',a:'In a <strong>2nd class lever</strong>, the <strong>load is between</strong> the fulcrum and the effort.<br><br>Order: <strong>Fulcrum — Load — Effort</strong><br><br>Examples: <strong>wheelbarrow, nutcracker, bottle opener, stapler</strong><br><br>The load is always closer to the fulcrum than the effort.'},
{id:46,topic:'levers',topicLabel:'Simple machines',q:'What is a 3rd class lever? Give 2 examples.',a:'In a <strong>3rd class lever</strong>, the <strong>effort is between</strong> the fulcrum and the load.<br><br>Order: <strong>Fulcrum — Effort — Load</strong><br><br>Examples: <strong>fishing rod, tweezers/tongs, broom, shovel, human arm</strong><br><br>3rd class levers increase speed and range of motion but require more effort.'},
{id:47,topic:'levers',topicLabel:'Simple machines',q:'A fishing rod: the handle is the fulcrum, your hand pulls up in the middle, the fish is at the end. What class of lever is it?',a:'<strong>3rd class lever.</strong><br><br>Fulcrum (handle) — Effort (your hand, in the middle) — Load (fish, at the end).<br><br>The effort is between the fulcrum and the load → 3rd class.'},
{id:48,topic:'levers',topicLabel:'Simple machines',q:'A wheelbarrow: the wheel is the fulcrum, the load is in the middle, you lift at the handles. What class?',a:'<strong>2nd class lever.</strong><br><br>Fulcrum (wheel) — Load (in the tray, middle) — Effort (handles, at the end).<br><br>The load is between the fulcrum and the effort → 2nd class.'},
{id:49,topic:'levers',topicLabel:'Simple machines',q:'Scissors: the pivot is in the middle, you squeeze the handles, the blades cut the object. What class?',a:'<strong>1st class lever.</strong><br><br>Effort (handles) — Fulcrum (pivot in the middle) — Load (object being cut).<br><br>The fulcrum is between the effort and the load → 1st class.'},
{id:50,topic:'levers',topicLabel:'Simple machines',q:'A stapler: the hinge is at the back, the staple pushes down in the middle, you press at the front. What class?',a:'<strong>2nd class lever.</strong><br><br>Fulcrum (hinge at back) — Load (staple in middle) — Effort (your hand pressing at front).<br><br>The load is between the fulcrum and the effort → 2nd class.'},

// MOTION & INERTIA
{id:51,topic:'motion',topicLabel:'Motion & inertia',q:'Define inertia.',a:'<strong>Inertia</strong> is an object\'s <strong>resistance to change in its motion</strong>. An object at rest tends to stay at rest, and an object in motion tends to stay in motion — unless acted on by an unbalanced force.<br><br>The more mass an object has, the more inertia it has (the harder it is to start, stop or change direction).'},
{id:52,topic:'motion',topicLabel:'Motion & inertia',q:'Which trolley would be more difficult to push around a corner — an empty one or a full one? Explain why.',a:'The <strong>full trolley</strong> is more difficult.<br><br>It has <strong>more mass</strong> and therefore <strong>more inertia</strong> — it resists changes in motion more than the empty trolley. Turning a corner requires changing direction, which requires an unbalanced force. Greater mass needs a <strong>greater force</strong> to achieve the same change in motion.'},
{id:53,topic:'motion',topicLabel:'Motion & inertia',q:'For the same force, what happens if you increase the mass of the object?',a:'The object accelerates <strong>less</strong>.<br><br>Greater mass = more inertia = more resistance to change. For the same force, a heavier object has a <strong>smaller acceleration</strong> than a lighter one.<br><br>This is from F = ma → if F is constant and m increases, then a must decrease.'},
{id:54,topic:'motion',topicLabel:'Motion & inertia',q:'For the same mass, what happens if you increase the force?',a:'The object accelerates <strong>more</strong>.<br><br>A greater force produces a greater change in motion (greater acceleration).<br><br>From F = ma → if m is constant and F increases, then a must also increase. Double the force = double the acceleration.'},
];

const STORAGE_KEY='yr7physexam_ratings_v1';
let deck=[],currentIdx=0,isFlipped=false,cardRatings={};

function saveRatings(){try{window.storage.set(STORAGE_KEY,JSON.stringify(cardRatings))}catch(e){}try{sessionStorage.setItem(STORAGE_KEY,JSON.stringify(cardRatings))}catch(e){}}
async function loadRatings(){try{const r=await window.storage.get(STORAGE_KEY);if(r&&r.value){cardRatings=JSON.parse(r.value);return}}catch(e){}try{const s=sessionStorage.getItem(STORAGE_KEY);if(s){cardRatings=JSON.parse(s);return}}catch(e){}cardRatings={}}

function topicBg(t){return{types:'#F0EDFB',balanced:'#EBF3FB',netforce:'#FDF3E3',gravity:'#FCEAEA',diagrams:'#E6F5EE',speed:'#E8F4FD',fma:'#FBF0E8',levers:'#F0EDFB',motion:'#FDF3E3'}[t]||'#f5f4f0'}
function topicFg(t){return{types:'#2d1b69',balanced:'#0d2447',netforce:'#5a3c06',gravity:'#5a1010',diagrams:'#0d3d25',speed:'#0a3a5a',fma:'#6a3a0a',levers:'#2d1b69',motion:'#5a3c06'}[t]||'#444'}

function countNeeds(){return CARDS.filter(c=>cardRatings[c.id]==='again').length}
function countKnowit(){return CARDS.filter(c=>cardRatings[c.id]==='good').length}
function countUnrated(){return CARDS.filter(c=>!cardRatings[c.id]).length}
function updateCounts(){const n=countNeeds(),k=countKnowit();document.getElementById('needs-count').textContent=n;document.getElementById('knowit-count').textContent=k;document.getElementById('unrated-count').textContent=countUnrated();document.getElementById('st-needs').textContent=n;document.getElementById('st-knowit').textContent=k;document.getElementById('st-total').textContent=n+k}

function setFilter(filter,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active','active-n','active-k'));
  if(filter==='needs')btn.classList.add('active-n');else if(filter==='knowit')btn.classList.add('active-k');else btn.classList.add('active');
  if(filter==='needs'){deck=CARDS.filter(c=>cardRatings[c.id]==='again');if(!deck.length){alert('No "Needs work" cards yet!');deck=[...CARDS]}}
  else if(filter==='knowit'){deck=CARDS.filter(c=>cardRatings[c.id]==='good');if(!deck.length){alert('No "Know it!" cards yet!');deck=[...CARDS]}}
  else if(filter==='unrated'){deck=CARDS.filter(c=>!cardRatings[c.id]);if(!deck.length){alert('All rated!');deck=[...CARDS]}}
  else if(filter==='all')deck=[...CARDS];
  else deck=CARDS.filter(c=>c.topic===filter);
  shuffle(deck);currentIdx=0;isFlipped=false;
  document.getElementById('done-screen').style.display='none';document.getElementById('card-area').style.display='block';
  document.getElementById('card-inner').classList.remove('flipped');document.getElementById('answer-input').value='';
  showCard();updateProgress();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
function showCard(){
  if(!deck.length)return;const c=deck[currentIdx];
  document.getElementById('topic-badge').textContent=c.topicLabel;document.getElementById('topic-badge').style.cssText=`background:${topicBg(c.topic)};color:${topicFg(c.topic)}`;
  document.getElementById('card-q').textContent=c.q;
  document.getElementById('topic-badge-back').textContent=c.topicLabel;document.getElementById('topic-badge-back').style.cssText=`background:${topicBg(c.topic)};color:${topicFg(c.topic)}`;
  document.getElementById('card-a').innerHTML=c.a;document.getElementById('card-num').textContent=(currentIdx+1)+' of '+deck.length;
  const r=cardRatings[c.id];document.getElementById('card-area').className='card-area'+(r==='again'?' outline-again':r==='good'?' outline-good':'');
  document.getElementById('btn-prev').disabled=currentIdx===0;document.getElementById('btn-next').disabled=currentIdx===deck.length-1;
  requestAnimationFrame(()=>{const s=document.getElementById('card-spacer');s.innerHTML=document.getElementById('card-a').innerHTML;s.style.minHeight=Math.max(200,document.getElementById('card-front').scrollHeight,document.getElementById('card-back').scrollHeight)+'px'});
}
function flipCard(){
  if(isFlipped)return;isFlipped=true;const typed=document.getElementById('answer-input').value.trim();const d=document.getElementById('your-answer-display');
  if(typed){d.textContent=typed;d.classList.remove('empty')}else{d.textContent='(no answer written)';d.classList.add('empty')}
  document.getElementById('card-inner').classList.add('flipped');
  requestAnimationFrame(()=>{document.getElementById('card-spacer').style.minHeight=Math.max(200,document.getElementById('card-back').scrollHeight)+'px'});
}
function unflipCard(){if(!isFlipped)return;isFlipped=false;document.getElementById('card-inner').classList.remove('flipped');requestAnimationFrame(()=>{document.getElementById('card-spacer').style.minHeight=Math.max(200,document.getElementById('card-front').scrollHeight)+'px'})}
function rate(r){cardRatings[deck[currentIdx].id]=r;saveRatings();updateCounts();document.getElementById('card-area').className='card-area'+(r==='again'?' outline-again':' outline-good');setTimeout(()=>{if(currentIdx<deck.length-1)nextCard();else showDone()},300)}
function nextCard(){if(currentIdx<deck.length-1){currentIdx++;resetToFront()}else showDone()}
function prevCard(){if(currentIdx>0){currentIdx--;resetToFront()}}
function resetToFront(){isFlipped=false;document.getElementById('card-inner').classList.remove('flipped');document.getElementById('answer-input').value='';showCard();updateProgress()}
function updateProgress(){const rated=deck.filter(c=>cardRatings[c.id]).length;const pct=deck.length?Math.round(rated/deck.length*100):0;document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('prog-label').textContent=rated+' / '+deck.length+' rated'}
function showDone(){
  document.getElementById('card-area').style.display='none';document.getElementById('card-num').textContent='';document.getElementById('done-screen').style.display='block';
  const n=countNeeds(),k=countKnowit();document.getElementById('done-title').textContent=k>n?'🎉 Great work!':'💪 Keep going!';
  document.getElementById('done-msg').textContent=k+' in Know it!, '+n+' in Needs work.'+(n>0?' Review the Needs work pile!':'');
  document.getElementById('btn-do-needs').style.display=n>0?'':'none';
}
function restartDeck(){document.getElementById('done-screen').style.display='none';document.getElementById('card-area').style.display='block';shuffle(deck);currentIdx=0;resetToFront()}
async function init(){await loadRatings();deck=[...CARDS];shuffle(deck);showCard();updateCounts();updateProgress()}
init();
</script>
</body>
</html>
